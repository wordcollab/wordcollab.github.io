<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="BnD Déco — حرفي جبس وديكور داخلي في رليزان. أسقف جبسية، قواطع، تغليف جدران، LED ومواد ديكورية."
  />
  <title>BnD Déco | جبس وديكور رليزان</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header" id="top">
    <div class="container header-wrapper">
      <a href="#top" class="brand" aria-label="BnD Déco Home">
        <img src="logo.png" alt="BnD Déco Logo" class="brand-logo" />
        <span class="brand-text">BnD Déco</span>
      </a>

      <div class="header-actions">
        <button
          class="lang-toggle"
          id="langToggle"
          type="button"
          aria-label="Change language"
        >
          <span class="lang-icon">🌐</span>
          <span>FR</span>
        </button>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="site-nav"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav class="site-nav" id="site-nav" aria-label="Main navigation"></nav>
    </div>
  </header>

  <main>
    <section class="hero-section" id="accueil">
      <div class="container hero-grid">
        <div class="hero-content">
          <p class="hero-kicker" id="heroKicker"></p>
          <h1 id="heroTitle"></h1>
          <p class="hero-text" id="heroText"></p>
          <p class="hero-location" id="heroLocation"></p>

          <div class="hero-actions">
            <a href="#travaux" class="btn btn-primary" id="heroPrimaryBtn"></a>
            <a href="#contact" class="btn btn-secondary" id="heroSecondaryBtn"></a>
          </div>
        </div>

        <div class="hero-card">
          <div class="hero-card-inner">
            <h2 id="heroCardTitle"></h2>
            <p id="heroCardText"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="section travaux-section" id="travaux">
      <div class="container">
        <div class="section-head">
          <p class="section-kicker"></p>
          <h2></h2>
          <p></p>
        </div>

        <div class="filters" id="travauxFilters"></div>
        <div class="travaux-grid" id="travauxGrid"></div>
      </div>
    </section>

    <section class="section materiaux-section" id="materiaux">
      <div class="container">
        <div class="section-head">
          <p class="section-kicker"></p>
          <h2></h2>
          <p></p>
        </div>

        <div class="materiaux-grid" id="materiauxGrid"></div>
      </div>
    </section>

    <section class="section contact-section" id="contact">
      <div class="container">
        <div class="section-head section-head-light">
          <p class="section-kicker"></p>
          <h2></h2>
          <p></p>
        </div>

        <div class="contact-cards" id="contactCards"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrapper">
      <div>
        <h3>BnD Déco</h3>
        <p id="footerText"></p>
      </div>

      <div class="footer-links" id="footerLinks"></div>
    </div>
  </footer>

  <div class="media-modal" id="mediaModal" aria-hidden="true">
    <div class="media-modal-overlay" data-close-modal></div>

    <div class="media-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="mediaModalTitle">
      <button class="media-modal-close" type="button" aria-label="Close modal" data-close-modal>
        ×
      </button>

      <div class="media-modal-header">
        <h3 id="mediaModalTitle"></h3>
        <p id="mediaModalMeta"></p>
      </div>

      <div class="media-modal-viewer" id="mediaModalViewer"></div>

      <div class="media-modal-controls">
        <button type="button" id="prevSlideBtn"></button>
        <button type="button" id="nextSlideBtn"></button>
      </div>
    </div>
  </div>

  <script src="data/config.js"></script>
  <script src="data/info.js"></script>
  <script src="data/travaux.js"></script>
  <script src="data/materiaux.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
